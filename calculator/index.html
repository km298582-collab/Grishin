<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <input type = "text" id = "firstInput" autocomplete="off" />

    <button id = "plus" data-value="1">+</button>
    <button id = "minus" data-value="2">-</button>
    <button id = "multiply" data-value="3">*</button>
    <button id = "delit" data-value="4">/</button>
    <button id = "proc" data-value="5">%</button>
    <input  type = "text" id = "SecondInput" autocomplete="off"/>
    <button id = "Rass">Рассчитать</button>
    <input id = "answer" type = "text" autocomplete="off" readonly>


    <script src="./script.js"></script>
</body>
</html>
